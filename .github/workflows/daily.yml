name: daily-ai-digest

on:
  # Schedule removed 2026-05-26. GH Actions cron was unreliable even at :13
  # (no-show on 2026-05-26, 4.5h late on 2026-05-25). The daily trigger is
  # now driven by GCP Cloud Scheduler job `ai-news-daily-trigger` (UTC 05:13)
  # which POSTs workflow_dispatch via pili-bot's /trigger/ai-news endpoint.
  # See vault: ~/vaults/wiki references reference-ai-news-digest +
  # reference-pili-automation.
  workflow_dispatch:
    inputs:
      date:
        description: 'Madrid local day to build (YYYY-MM-DD). Empty = yesterday.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Write GCP service-account key
        env:
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
        run: |
          umask 077
          printf '%s' "$GCP_SA_JSON" > /tmp/sa.json

      - name: Build digest
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python -m src.run --date "${{ github.event.inputs.date }}"
          else
            python -m src.run
          fi

      - name: Commit and push
        run: |
          git config user.name 'ai-news-bot'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/ data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "digest: $(date -u +%Y-%m-%d)"
            git push
          fi
